<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ KnowNow Extension</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c20, #15102a);
            color: #ffffff;
            text-align: center;
            padding: 80px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 { color: #468e2e; margin-bottom: 10px; font-size: 2.5em; }
        p { color: #b4b4d0; line-height: 1.6; font-size: 1.1em; }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: #468e2e;
            color: #0f0c20;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: 0.2s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Know Now</h1>
        <p>An AI web browser extension built for Chrome, Edge, Safari, and Hack Club Stardance.</p>
        <p>Highlight text on a webpage, right-click, and get context</p>
        <a href="https://github.com/vijayakasee-debug/know-now" class="btn">View Source Code</a>
    </div>
</body>
</html>
